      <rect x="104" y="792" width="20" height="26" rx="2" />
      <rect x="144" y="792" width="20" height="26" rx="2" />
      <rect x="184" y="792" width="20" height="26" rx="2" />
      <rect x="64" y="848" width="20" height="26" rx="2" />
      <rect x="144" y="848" width="20" height="26" rx="2" />
      <rect x="184" y="848" width="20" height="26" rx="2" />
      <rect x="104" y="904" width="20" height="26" rx="2" />
      <rect x="184" y="904" width="20" height="26" rx="2" />
      <rect x="64" y="960" width="20" height="26" rx="2" />
      <rect x="144" y="960" width="20" height="26" rx="2" />
    </g>
    <g id="win-b">
      <rect x="264" y="732" width="20" height="26" rx="2" />
      <rect x="304" y="732" width="20" height="26" rx="2" />
      <rect x="344" y="732" width="20" height="26" rx="2" />
      <rect x="264" y="788" width="20" height="26" rx="2" />
      <rect x="344" y="788" width="20" height="26" rx="2" />
      <rect x="304" y="844" width="20" height="26" rx="2" />
      <rect x="264" y="900" width="20" height="26" rx="2" />
      <rect x="344" y="900" width="20" height="26" rx="2" />
      <rect x="304" y="956" width="20" height="26" rx="2" />
    </g>
    <g id="win-c">
      <rect x="440" y="852" width="24" height="30" rx="2" />
      <rect x="490" y="852" width="24" height="30" rx="2" />
      <rect x="540" y="852" width="24" height="30" rx="2" />
      <rect x="440" y="916" width="24" height="30" rx="2" />
      <rect x="540" y="916" width="24" height="30" rx="2" />
      <rect x="490" y="980" width="24" height="30" rx="2" />
      <rect x="440" y="1044" width="24" height="30" rx="2" />
      <rect x="540" y="1044" width="24" height="30" rx="2" />
