      <rect x="696" y="772" width="20" height="26" rx="2" />
      <rect x="736" y="772" width="20" height="26" rx="2" />
      <rect x="656" y="828" width="20" height="26" rx="2" />
      <rect x="736" y="828" width="20" height="26" rx="2" />
      <rect x="696" y="884" width="20" height="26" rx="2" />
      <rect x="656" y="940" width="20" height="26" rx="2" />
      <rect x="736" y="940" width="20" height="26" rx="2" />
    </g>
    <g id="win-e">
      <rect x="800" y="832" width="20" height="26" rx="2" />
      <rect x="840" y="832" width="20" height="26" rx="2" />
      <rect x="800" y="888" width="20" height="26" rx="2" />
      <rect x="840" y="888" width="20" height="26" rx="2" />
      <rect x="800" y="944" width="20" height="26" rx="2" />
