{% extends "base.html" %}
{% block title %}Report Scam - RentalVerify{% endblock %}
{% block content %}
<section class="page-head">
  <span class="eyebrow">Scam report</span>
  <h1>Submit a scam report</h1>
  <p>Use this form when a landlord, agent, or listing looks suspicious.</p>
</section>

<section class="card form-card">
  <form class="form-grid">
    <label>
      Your name
      <input type="text" value="Amina Wanjiku">
    </label>
    <label>
      Your phone
      <input type="text" value="0711 222 333">
    </label>
    <label>
      Landlord name
      <input type="text" value="Muriuki Property Services">
    </label>
    <label>
      Landlord phone
      <input type="text" value="0712 456 789">
    </label>
    <label>
      National ID
      <input type="text" value="2714 8891 2456">
    </label>
    <label>
      M-Pesa number
      <input type="text" value="254712456789">
    </label>
    <label class="full">
      Property address
      <input type="text" value="Kilimani, Nairobi">
    </label>
    <label class="full">
      Description
      <textarea rows="5">The person requested a deposit before viewing the house and became unreachable afterwards.</textarea>
    </label>
    <div class="button-row full">
      <a class="btn btn-primary" href="/report/confirmation">Submit report</a>
      <a class="btn btn-secondary" href="/search">Back to search</a>
    </div>
  </form>
</section>
{% endblock %}
